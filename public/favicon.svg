<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="wool" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFEF5"/>
      <stop offset="100%" stop-color="#F5EED6"/>
    </radialGradient>
    <radialGradient id="face" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FAF4E8"/>
      <stop offset="100%" stop-color="#EEE4D4"/>
    </radialGradient>
  </defs>
  
  <!-- Wool puffs -->
  <ellipse cx="16" cy="10" rx="12" ry="8" fill="url(#wool)"/>
  <ellipse cx="8" cy="14" rx="5" ry="4" fill="url(#wool)"/>
  <ellipse cx="24" cy="14" rx="5" ry="4" fill="url(#wool)"/>
  <ellipse cx="12" cy="8" rx="4" ry="3" fill="url(#wool)"/>
  <ellipse cx="20" cy="8" rx="4" ry="3" fill="url(#wool)"/>
  <ellipse cx="16" cy="6" rx="3" ry="2.5" fill="#FFFEF8"/>
  
  <!-- Ears -->
  <ellipse cx="6" cy="16" rx="3" ry="2" fill="url(#face)" transform="rotate(-30 6 16)"/>
  <ellipse cx="26" cy="16" rx="3" ry="2" fill="url(#face)" transform="rotate(30 26 16)"/>
  
  <!-- Face -->
  <ellipse cx="16" cy="20" rx="8" ry="9" fill="url(#face)"/>
  
  <!-- Eyes -->
  <ellipse cx="13" cy="18" rx="2" ry="2.2" fill="#1a1a1a"/>
  <ellipse cx="19" cy="18" rx="2" ry="2.2" fill="#1a1a1a"/>
  <ellipse cx="12.5" cy="17.5" rx="0.8" ry="0.6" fill="white" opacity="0.9"/>
  <ellipse cx="18.5" cy="17.5" rx="0.8" ry="0.6" fill="white" opacity="0.9"/>
  
  <!-- Nose -->
  <ellipse cx="16" cy="23" rx="3" ry="1.8" fill="#C9A0A0"/>
  <ellipse cx="16" cy="22.7" rx="2.2" ry="1.2" fill="#D4AAAA"/>
  
  <!-- Smile -->
  <path d="M 13 25.5 Q 16 27.5 19 25.5" stroke="#8B7355" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>